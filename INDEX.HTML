<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Page</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/* CONTAINER */
.container{
max-width:1200px;
width:100%;
margin:auto;
padding:20px;
}

/* NAVBAR */
nav{
background:black;
color:rgb(205, 151, 151);
padding:15px;
}

nav ul{
display:flex;
justify-content:space-around;
list-style:none;
}

nav ul li{
cursor:pointer;
}

/* HERO */
.hero{
text-align:center;
padding:40px;
background:#cd7171;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

/* ROW / CARDS */
.row{
display:flex;
gap:20px;
margin-top:20px;
}

.card{
flex:1;
background:#684444;
padding:20px;
text-align:center;
border-radius:10px;
}

.card img{
width:100%;
height:auto;
border-radius:10px;
}

/* FOOTER */
footer{
text-align:center;
padding:15px;
background:rgb(238, 235, 235);
color:rgba(21, 21, 21, 0.908);
margin-top:20px;
}

/* ✅ RESPONSIVE */
@media (max-width:768px){

nav ul{
flex-direction:column;
align-items:center;
gap:10px;
}

.hero h1{
font-size:22px;
}

.row{
flex-direction:column;
}

}

</style>
</head>

<body>

<nav>
<ul>
<li>Home</li>
<li>About</li>
<li>Services</li>
<li>Contact</li>
</ul>
</nav>

<div class="container">

<div class="hero">
<h1>Responsive Web Page</h1>
<p>This page adjusts automatically for mobile devices</p>
</div>

<div class="row">

<div class="card">
<img src="https://www.guvi.in/blog/wp-content/uploads/2023/10/HTML-1200x675.webp" alt="">
<h3>Card 1</h3>
<p>Sample content</p>
</div>

<div class="card">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTzlfarifuq70EEYKyrpdLiRG1syBHJ9mm3bw&s" alt="">
<h3>Card 2</h3>
<p>Sample content</p>
</div>

<div class="card">
<img src="https://repository-images.githubusercontent.com/539560750/278d0bbf-6aaf-4f38-a18f-e328305bcd7b" alt="">
<h3>Card 3</h3>
<p>Sample content</p>
</div>

</div>

</div>

<footer>
<p>© 2026 Responsive Design</p>
</footer>

</body>
</html>
